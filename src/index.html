    <link rel="stylesheet" href="./styles.css" />
    <!-- Hide every workbook custom element by default. They're data
         carriers, not visual content; without this the save handler's
         refresh of <wb-doc> textContent shows thousands of chars of
         base64 on top of the app. !important so author CSS can't
         accidentally re-show them. -->
    <style>
      wb-workbook, wb-doc, wb-memory, wb-data, wb-history,
      wb-cell, wb-input, wb-output, wb-agent, wb-chat, wb-system, wb-tool {
        display: none !important;
      }
    </style>
  </head>
  <body class="bg-page text-fg antialiased">
    <!-- Workbook runtime root. The single <wb-doc> declares the
         persistent CRDT state for the studio (composition + asset
         registry, both managed via Yjs shared types inside one doc).
         The runtime registers a Y.Doc-backed handle here at mount;
         yjsBackend.svelte.js reads it via window.__wbRuntime, then
         attaches a y-indexeddb provider for browser-side persistence.
         The element body also receives the doc bytes on Cmd+S export
         for portable .workbook.html round-trip. -->
    <wb-workbook>
      <wb-doc id="hyperframes-state" format="yjs"></wb-doc>
    </wb-workbook>

    <div id="app"></div>
    <script type="module" src="./main.js"></script>
  </body>
